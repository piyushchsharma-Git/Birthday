<style>
    body {
        margin: 0;

        color: white;

        color: white;

        padding: 15px 25px;

        background: #ff4d6d;

    #finalMessage {

        color: white;
        font-size: 26px;
        text-align: center;
        text-shadow: 2px 2px 10px black;
        margin-top: 20px;
    }

    /* Floating hearts */
    .heart {
        position: absolute;
        color: pink;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        0% { transform: translateY(100vh); opacity: 1; }
        100% { transform: translateY(-10vh); opacity: 0; }
    }

<body>

```
<h1>🎂 Happy Birthday Ditu ❤️</h1>
<div id="message"></div>

<button id="surprise" onclick="showSurprise()">Open Your Gift 🎁</button>
<button id="later">Later 😜</button>

<img id="gif" src="cake.gif">
<div id="finalMessage">I may not always say it, but you are the best thing that has ever happened in my life ❤️</div>

<audio id="music" src="music.mp3"></audio>
```

<script>
    // Typing effect
    const text = "I have something special for you... 💌";
    let i = 0;

    function typeEffect() {
        if (i < text.length) {
            document.getElementById("message").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeEffect, 50);
        }
    }
    typeEffect();

    // Buttons logic
    let scale = 1;
    const laterBtn = document.getElementById("later");
    const surpriseBtn = document.getElementById("surprise");

    laterBtn.addEventListener("mouseover", function() {

        // Move "Later" button
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        laterBtn.style.left = x + "px";
        laterBtn.style.top = y + "px";

        // Grow "Open Gift" button
        scale += 0.2;
        surpriseBtn.style.transform = "scale(" + scale + ")";
        surpriseBtn.style.boxShadow = "0 0 20px #ff4d6d";
    });

    // Surprise click
    function showSurprise() {
        document.getElementById("gif").style.display = "block";
        document.getElementById("finalMessage").style.display = "block";
        document.getElementById("music").play();
    }

    // Floating hearts
    function createHeart() {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
