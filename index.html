<!DOCTYPE html>

<html>
<head>
<title>Happy Birthday ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: Arial, sans-serif;
}

/* Background */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
    z-index: -1;
    transition: 0.5s;
}

.blur {
    filter: blur(6px);
}

/* Popup */
#popup {
    display: none;
    position: fixed;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    color: white;
    padding: 15px 20px;
    border-radius: 12px;
    text-align: center;
    font-size: 20px;
    max-width: 85%;
    z-index: 10;
    white-space: pre-wrap;
}

/* Cursor */
.cursor {
    display: inline-block;
    margin-left: 2px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
}

/* Heading */
h1 {
    color: white;
    font-size: 34px;
    text-shadow: 2px 2px 10px black;
    text-align: center;
}

/* Message */
#message {
    color: white;
    font-size: 20px;
    text-shadow: 1px 1px 8px black;
    margin-top: 10px;
    text-align: center;
    padding: 0 15px;
}

/* Buttons */
button {
    padding: 14px 22px;
    font-size: 16px;
    margin: 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#surprise {
    background: #ff4d6d;
    color: white;
    transition: transform 0.3s, box-shadow 0.3s, opacity 0.3s;
}

#later {
    background: grey;
    color: white;
}

/* Funny text */
#funText {
    position: fixed;
    bottom: 30px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 8px black;
}

.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

/* Surprise */
#gif {
    display: none;
    width: 260px;
    margin-top: 15px;
}

#finalMessage {
    display: none;
    color: white;
    font-size: 22px;
    text-align: center;
    margin-top: 15px;
    text-shadow: 2px 2px 10px black;
}

/* Mobile */
@media (max-width: 768px) {
    h1 { font-size: 26px; }
    #message { font-size: 18px; }
    #funText { font-size: 20px; }
    #popup { font-size: 16px; top: 15px; }
}
</style>

</head>

<body>

<img src="ditu.jpg" class="bg">

<div id="popup"></div>

<h1 id="title">🎂 Happy Birthday ❤️</h1>
<div id="message"></div>

<button id="surprise" onclick="showSurprise()">Open Your Gift 🎁</button> <button id="later">Later 😜</button>

<div id="funText"></div>

<img id="gif" src="cake.gif">

<div id="finalMessage">
I may not say it always, but you are the best thing that has ever happened in my life ❤️
</div>

<audio id="music" src="music.mp3"></audio>

<script>

/* STORY FLOW */
const messages = [
    "Wait... I want to say something 💌",
    "You came into my life..., And made everything better ❤️"
];

let m = 0;
function showMessages() {
    if (m < messages.length) {
        document.getElementById("message").innerText = messages[m];

        let delay = 2000;
        if (m === 0) delay = 3500;

        m++;
        setTimeout(showMessages, delay);
    }
}
showMessages();

/* BUTTON LOGIC */
let scale = 1;
const laterBtn = document.getElementById("later");
const surpriseBtn = document.getElementById("surprise");
const funText = document.getElementById("funText");

const texts = ["Are you sure? 😏", "Think again 😂", "No escape 😜"];
let t = 0;

laterBtn.addEventListener("mouseover", function() {

    laterBtn.style.position = "absolute";

    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    laterBtn.style.left = x + "px";
    laterBtn.style.top = y + "px";

    scale += 0.2;
    surpriseBtn.style.transform = "scale(" + scale + ")";
    surpriseBtn.style.boxShadow = "0 0 20px #ff4d6d";

    funText.innerText = texts[t % texts.length];
    funText.classList.add("shake");
    setTimeout(() => funText.classList.remove("shake"), 300);
    t++;
});

/* CONFETTI */
function confetti() {
    for (let i = 0; i < 80; i++) {
        let div = document.createElement("div");
        div.style.position = "fixed";
        div.style.width = "6px";
        div.style.height = "6px";
        div.style.background = "white";
        div.style.left = Math.random() * window.innerWidth + "px";
        div.style.top = Math.random() * window.innerHeight + "px";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
    }
}

/* POPUP WITH CURSOR */
function typePopup(text) {
    let i = 0;
    let popup = document.getElementById("popup");
    popup.innerHTML = "";
    popup.style.display = "block";

    let cursor = document.createElement("span");
    cursor.className = "cursor";
    cursor.innerText = "|";
    popup.appendChild(cursor);

    function type() {
        if (i < text.length) {
            cursor.remove();
            popup.innerHTML += text.charAt(i);
            popup.appendChild(cursor);
            i++;
            setTimeout(type, 40);
        } else {
            cursor.remove();
        }
    }
    type();
}

/* SURPRISE */
function showSurprise() {

    // 🔥 Change title
    document.getElementById("title").innerText = "🎂 Happy Birthday Ditu ❤️";

    document.getElementById("gif").style.display = "block";
    document.getElementById("finalMessage").style.display = "block";
    document.getElementById("music").play();

    document.querySelector(".bg").classList.add("blur");

    confetti();

    setTimeout(() => {
        typePopup("You make my world better just by being in it 💖");
    }, 1200);

    funText.style.display = "none";

    surpriseBtn.style.opacity = "0";
    laterBtn.style.opacity = "0";

    setTimeout(() => {
        surpriseBtn.style.display = "none";
        laterBtn.style.display = "none";
    }, 300);
}

</script>

</body>
</html>
